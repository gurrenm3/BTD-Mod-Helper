name: Build

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
    paths:
      - BloonsTD6 Mod Helper/**
      - UpdaterPlugin/**
      - SourceGenerators/**
      - .github/workflows/build.yml
  pull_request:
    branches:
      - '*'

env:
  PROJECT_NAME: BloonsTD6 Mod Helper

  BLOONSTD6: ./BloonsTD6
  MOD_HELPER_NAME: Btd6ModHelper
  UPDATER_PLUGIN_NAME: UpdaterPlugin
  SOURCE_GENERATORS_NAME: SourceGenerators

jobs:
  build:
    
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repo
        uses: actions/checkout@master

      - name: Validate JSON
        uses: walbo/validate-json@v1.1.0
        with:
          files: modders.json

      - name: Download MelonLoader Release
        if: env.MELONLOADER_BRANCH == ''
        uses: robinraju/release-downloader@v1.13
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: LavaGang/MelonLoader
          fileName: MelonLoader.x64.zip
          latest: true
          extract: true
          extract-path: ${{ env.BLOONSTD6 }}

      - name: Download MelonLoader Artifact
        if: env.MELONLOADER_BRANCH != ''
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          branch: ${{ env.MELONLOADER_BRANCH }}
          name: MelonLoader.Windows.x64.CI.Release
          repo: LavaGang/MelonLoader
          path: ${{ env.BLOONSTD6 }}

      - name: Clone Dependencies Repo
        uses: actions/checkout@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: doombubbles/btd6-ci-dependencies
          ref: main
          path: ${{ env.BLOONSTD6 }}/MelonLoader/Il2CppAssemblies

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Mod
        run: dotnet build -c Release -p:BloonsTD6="../${{ env.BLOONSTD6 }}" "${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj"

      - name: Upload Mod DLL
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MOD_HELPER_NAME }}.dll
          path: ${{ env.BLOONSTD6 }}/Mods/${{ env.MOD_HELPER_NAME }}.dll

      - name: Upload Mod Documentation
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MOD_HELPER_NAME }}.xml
          path: ${{ env.BLOONSTD6 }}/Mods/${{ env.MOD_HELPER_NAME }}.xml

      - name: Build Plugin
        run: dotnet build -c Release -p:BloonsTD6="../${{ env.BLOONSTD6 }}" "${{ env.UPDATER_PLUGIN_NAME }}/${{ env.UPDATER_PLUGIN_NAME }}.csproj"

      - name: Upload Plugin DLL
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.UPDATER_PLUGIN_NAME }}.dll
          path: ${{ env.BLOONSTD6 }}/Plugins/${{ env.UPDATER_PLUGIN_NAME }}.dll

      - name: Build Source Generators
        run: dotnet build -c Release -p:BloonsTD6="../${{ env.BLOONSTD6 }}" "${{ env.SOURCE_GENERATORS_NAME }}/${{ env.SOURCE_GENERATORS_NAME }}.csproj"

      - name: Publish Source Generators
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./${{ env.SOURCE_GENERATORS_NAME }}/bin/Release/*.nupkg" --api-key "$NUGET_API_KEY" --source nuget.org --skip-duplicate

      - name: Rotate changelog Unreleased section to ${{ github.ref_name }}
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        uses: baynezy/ChangeLogger.Action@1.2.4.10
        with:
          tag: ${{ github.ref_name }}
          log-path: ${{ env.PROJECT_NAME }}/CHANGELOG.md
          repo-path: ${{ env.PROJECT_NAME }}

      - name: Commit changelog changes if needed
        if: startsWith(github.ref, 'refs/tags/') && env.ACT != 'true'
        continue-on-error: true
        working-directory: ${{ env.PROJECT_NAME }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash push -m "changelog_rotate" -- CHANGELOG.md
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          git pull --rebase origin "$DEFAULT_BRANCH"
          git stash pop
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG.md on $DEFAULT_BRANCH is already up to date; nothing to commit."
          else
            git commit -m "Release ${{ env.RELEASE_TAG }}"
            git push origin "$DEFAULT_BRANCH"
            echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.BLOONSTD6 }}/Mods/${{ env.MOD_HELPER_NAME }}.dll
            ${{ env.BLOONSTD6 }}/Mods/${{ env.MOD_HELPER_NAME }}.xml
            ${{ env.BLOONSTD6 }}/Plugins/${{ env.UPDATER_PLUGIN_NAME }}.dll
          body: ${{ steps.changelog.outputs.release-notes }}
          fail_on_unmatched_files: true
          draft: ${{ env.ACT == 'true' }}